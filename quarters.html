<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BDC Quarters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bdc-blue: #4a9eff;
      --bdc-red: #ff3a3a;
      --safety-orange: #E8652B;
      --bg-deep: #050608;
      --panel: rgba(8, 11, 17, 0.92);
      --panel-border: rgba(74, 158, 255, 0.25);
      --text: #d8dde5;
      --text-dim: #8a93a3;
      --text-faint: #545b69;
      --glow-blue: 0 0 24px rgba(74, 158, 255, 0.65);
      --glow-red: 0 0 24px rgba(255, 58, 58, 0.55);
      --glow-orange: 0 0 24px rgba(232, 101, 43, 0.65);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
    }

    /* ============ ROOM STAGE ============ */
    .room-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .room-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translate(-50%, -50%);
      transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1);
      will-change: transform;
    }
    /* subtle parallax — driven by JS reading mouse position */
    .room-stage.parallax .room-bg {
      transform: translate(calc(-50% + var(--px, 0px)), calc(-50% + var(--py, 0px)));
    }

    /* ============ AMBIENT EFFECTS ============ */
    .ambient-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    /* drifting particles inside the window area */
    .window-stars {
      position: absolute;
      left: 40%; top: 10%;
      width: 26%; height: 50%;
      overflow: hidden;
      mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
    }
    .window-stars::before, .window-stars::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(180,200,255,0.7), transparent),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 90% 50%, rgba(200,220,255,0.7), transparent);
      animation: starDrift 60s linear infinite;
    }
    .window-stars::after {
      animation-duration: 90s;
      animation-direction: reverse;
      opacity: 0.6;
    }
    @keyframes starDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(-30px); }
    }
    /* LED flicker overlays positioned on the LED strips */
    .led-flicker {
      position: absolute;
      background: var(--bdc-red);
      opacity: 0;
      mix-blend-mode: screen;
      filter: blur(6px);
      animation: flick 4s infinite;
    }
    .led-flicker-1 { left: 76%; top: 4%;  width: 8%; height: 1%; animation-delay: 0s; }
    .led-flicker-2 { left: 34%; top: 53%; width: 4%; height: 1%; animation-delay: 1.7s; }
    .led-flicker-3 { left: 7%;  top: 4%;  width: 6%; height: 1%; animation-delay: 3.1s; background: var(--bdc-blue); }
    @keyframes flick {
      0%, 92%, 100% { opacity: 0; }
      93%           { opacity: 0.65; }
      94%           { opacity: 0; }
      96%           { opacity: 0.4; }
      97%           { opacity: 0; }
    }

    /* ============ HOTSPOT LAYER ============ */
    .hotspot-layer {
      position: absolute; inset: 0;
      z-index: 2;
    }
    .hotspot {
      position: absolute;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease-out;
      padding: 0;
      border-radius: 3px;
      font-family: inherit;
      color: inherit;
    }
    /* Invisible by default — only the label hint shows on hover */
    .hotspot:hover, .hotspot:focus-visible {
      background: rgba(74, 158, 255, 0.08);
      border-color: rgba(74, 158, 255, 0.7);
      box-shadow: var(--glow-blue), inset 0 0 30px rgba(74, 158, 255, 0.15);
      outline: none;
    }
    .hotspot[data-tone="red"]:hover, .hotspot[data-tone="red"]:focus-visible {
      background: rgba(255, 58, 58, 0.08);
      border-color: rgba(255, 58, 58, 0.7);
      box-shadow: var(--glow-red), inset 0 0 30px rgba(255, 58, 58, 0.12);
    }
    .hotspot[data-tone="orange"]:hover, .hotspot[data-tone="orange"]:focus-visible {
      background: rgba(232, 101, 43, 0.08);
      border-color: rgba(232, 101, 43, 0.7);
      box-shadow: var(--glow-orange), inset 0 0 30px rgba(232, 101, 43, 0.15);
    }
    /* Locked hotspots get a different visual treatment */
    .hotspot.locked::before {
      content: '🔒';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .hotspot.locked:hover::before, .hotspot.locked:focus-visible::before {
      opacity: 0.8;
    }

    /* Hotspot label tooltip */
    .hotspot-label {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 10px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--bdc-blue);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
    }
    .hotspot[data-tone="red"] .hotspot-label { color: var(--bdc-red); }
    .hotspot[data-tone="orange"] .hotspot-label { color: var(--safety-orange); }
    .hotspot:hover .hotspot-label, .hotspot:focus-visible .hotspot-label {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    /* ============ HUD ============ */
    .hud {
      position: absolute;
      top: 16px; left: 18px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
    }
    .hud-handle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--text);
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    .hud-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--bdc-blue);
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    .hud-link {
      position: absolute;
      top: 16px; right: 18px;
      pointer-events: auto;
      z-index: 5;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--panel-border);
      background: rgba(8, 11, 17, 0.7);
      backdrop-filter: blur(4px);
      transition: all 0.18s;
    }
    .hud-link:hover {
      color: var(--bdc-blue);
      border-color: var(--bdc-blue);
      box-shadow: var(--glow-blue);
    }

    /* ============ MODAL ============ */
    .modal-host {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.25s ease-out;
    }
    .modal-host.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      max-width: 920px;
      width: 100%;
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 1px rgba(74, 158, 255, 0.4),
        0 0 40px rgba(74, 158, 255, 0.15),
        0 20px 60px rgba(0, 0, 0, 0.7);
      position: relative;
    }
    /* Sci-fi corner accents */
    .modal-panel::before, .modal-panel::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border: 2px solid var(--bdc-blue);
      pointer-events: none;
    }
    .modal-panel::before {
      top: -2px; left: -2px;
      border-right: none; border-bottom: none;
    }
    .modal-panel::after {
      bottom: -2px; right: -2px;
      border-left: none; border-top: none;
    }
    .modal-header {
      padding: 16px 22px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(74, 158, 255, 0.06), transparent);
    }
    .modal-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--bdc-blue);
    }
    .modal-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      flex: 1;
    }
    .modal-close {
      background: none;
      border: 1px solid var(--panel-border);
      color: var(--text-dim);
      width: 30px; height: 30px;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      transition: all 0.15s;
    }
    .modal-close:hover {
      color: var(--bdc-red);
      border-color: var(--bdc-red);
    }
    .modal-body {
      padding: 22px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-footer-note {
      padding: 10px 22px;
      border-top: 1px solid var(--panel-border);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-faint);
      background: rgba(0, 0, 0, 0.3);
    }

    /* Modal content shared */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-cell {
      padding: 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--panel-border);
      text-align: center;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--bdc-blue);
    }
    .placeholder-note {
      padding: 16px;
      background: rgba(232, 101, 43, 0.08);
      border-left: 3px solid var(--safety-orange);
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 18px;
    }
    .placeholder-note strong { color: var(--safety-orange); }

    /* Medal grid for the vault */
    .medal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 14px;
    }
    .medal-cell {
      padding: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--panel-border);
      text-align: center;
      transition: transform 0.15s, border-color 0.15s;
    }
    .medal-cell.owned { border-color: rgba(232, 101, 43, 0.5); }
    .medal-cell.locked { opacity: 0.32; }
    .medal-cell:hover { transform: translateY(-2px); border-color: var(--bdc-blue); }
    .medal-cell img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
    }
    .medal-cell .medal-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      margin-top: 6px;
      color: var(--text);
    }
    .medal-cell .medal-status {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-faint);
      margin-top: 2px;
    }
    .medal-cell.owned .medal-status { color: var(--safety-orange); }

    /* Lock-out screen for command deck */
    .locked-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .locked-screen .icon {
      font-size: 56px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 10px rgba(255, 58, 58, 0.6));
    }
    .locked-screen .deny {
      font-family: 'Rajdhani', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--bdc-red);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .locked-screen .reason {
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.15em;
    }

    /* ============ MOBILE FALLBACK ============ */
    .mobile-list {
      display: none;
    }
    @media (max-width: 800px) {
      html, body { overflow: auto; height: auto; }
      .room-stage {
        height: auto;
        aspect-ratio: 1672 / 941;
      }
      .room-bg {
        position: relative;
        top: auto; left: auto;
        transform: none;
        width: 100%;
        height: auto;
      }
      .hotspot-layer { display: none; }
      .hud-link { font-size: 10px; padding: 4px 8px; }
      .mobile-list {
        display: grid;
        gap: 10px;
        padding: 18px;
        grid-template-columns: repeat(2, 1fr);
        background: var(--bg-deep);
      }
      .mobile-tile {
        padding: 18px 14px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        color: var(--text);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
      }
      .mobile-tile:hover { border-color: var(--bdc-blue); color: var(--bdc-blue); }
      .modal-panel { max-height: 92vh; }
    }
  </style>
</head>
<body>

<div class="room-stage" id="room-stage">
  <img class="room-bg" src="assets/quarters/room-bg.png" alt="BDC Quarters">

  <div class="ambient-layer">
    <div class="window-stars"></div>
    <div class="led-flicker led-flicker-1"></div>
    <div class="led-flicker led-flicker-2"></div>
    <div class="led-flicker led-flicker-3"></div>
  </div>

  <div class="hotspot-layer" id="hotspot-layer"></div>

  <div class="hud">
    <div class="hud-handle" id="hud-handle">RAGINXPANDA</div>
    <div class="hud-rank" id="hud-rank">▸ FLEET ADMIRAL · BLACKDIAMOND CORP</div>
  </div>
  <a class="hud-link" href="./">← TRACKER</a>
</div>

<div class="mobile-list" id="mobile-list"></div>

<div class="modal-host" id="modal-host">
  <div class="modal-panel" id="modal-panel">
    <div class="modal-header">
      <span class="modal-tag" id="modal-tag">[01]</span>
      <div class="modal-title" id="modal-title">…</div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer-note" id="modal-footer">PHASE 1 · PLACEHOLDER DATA</div>
  </div>
</div>

<script>
  // ============================================================
  // BDC QUARTERS  ·  interactive sci-fi profile room
  //
  // Phase 1: standalone scaffold with placeholder data. Click any
  // object in the room, get a themed modal. No backend, no auth,
  // just visuals + interactions.
  //
  // Phase 2 (next): wire to /snapshot.json so the data is real,
  // pulling the current viewer's stats + medals.
  //
  // Phase 3: Discord OAuth — replace the hardcoded RaginXPanda
  // identity with the actual signed-in user.
  // ============================================================

  // ---------- placeholder identity (will come from auth in Ph 3) ----------
  const VIEWER = {
    handle: 'RaginXPanda',
    rank: 'FLEET ADMIRAL',
    rankCode: 'FADM',
    isOfficer: true,
    stats: {
      ops: 0,
      currentCampaign: 0,
      auec: 0,
      awards: 1, // Founders Mark (honorary)
    },
  };

  // ---------- hotspot definitions ----------
  // Positions are percentages of the room background. Easy to tune by
  // editing this single array — no markup or CSS changes needed.
  const HOTSPOTS = [
    { id: 'medals',   label: 'MEDAL VAULT',    x: 2,  y: 8,  w: 32, h: 52, tone: 'blue'   },
    { id: 'notices',  label: 'BDC NOTICES',    x: 32, y: 13, w: 7,  h: 30, tone: 'red'    },
    { id: 'window',   label: 'CAMPAIGN MAP',   x: 40, y: 10, w: 26, h: 50, tone: 'blue'   },
    { id: 'mission',  label: 'MISSION BOARD',  x: 67, y: 13, w: 19, h: 27, tone: 'red'    },
    { id: 'terminal', label: 'PERSONAL STATS', x: 76, y: 35, w: 14, h: 33, tone: 'blue'   },
    { id: 'logbook',  label: 'CAMPAIGN LOG',   x: 73, y: 80, w: 16, h: 16, tone: 'orange' },
    { id: 'shelves',  label: 'COLLECTIBLES',   x: 89, y: 10, w: 11, h: 80, tone: 'blue'   },
    { id: 'command',  label: 'COMMAND DECK',   x: 95, y: 2,  w: 5,  h: 7,  tone: 'red', locked: !VIEWER.isOfficer },
  ];

  // ---------- modal content builders ----------
  // Each builder returns { title, tag, body, note } — keeps content
  // colocated with its hotspot so adding new hotspots is one block.

  const MEDALS_DEMO = [
    { code: 'FOUNDERS_MARK',         name: 'Founders Mark',        owned: true,  honorary: true,  count: 0 },
    { code: 'CAMPAIGN_SERVICE_STAR', name: 'Campaign Service Star', owned: false, count: 0 },
    { code: 'DRILL_SERGEANT',        name: 'Drill Sergeant',        owned: false, count: 0 },
    { code: 'ACE_OF_CAMPAIGN',       name: 'Ace of the Campaign',   owned: false, count: 0 },
    { code: 'IRON_HULL',             name: 'Iron Hull',             owned: false, count: 0 },
    { code: 'HEART_OF_BDC',          name: 'Heart of BDC',          owned: false, count: 0 },
    { code: 'GUARDIAN_MEDAL',        name: 'Guardian Medal',        owned: false, count: 0 },
    { code: 'ORDER_OF_DIAMOND',      name: 'Order of the Diamond',  owned: false, count: 0 },
  ];

  const builders = {
    medals: () => ({
      tag: '[01] WALL DISPLAY',
      title: 'Medal Vault',
      body: `
        <p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin:0 0 16px;">
          Every medal earned and unearned. Glowing cells are yours. Click a medal in the live build for full detail + tier device.
        </p>
        <div class="medal-grid">
          ${MEDALS_DEMO.map(m => `
            <div class="medal-cell ${m.owned ? 'owned' : 'locked'}">
              <img src="assets/medals-v2/${m.code}.png" alt="${m.name}" loading="lazy">
              <div class="medal-name">${m.name}</div>
              <div class="medal-status">${m.owned ? (m.honorary ? 'HONORARY' : `× ${m.count}`) : 'LOCKED'}</div>
            </div>
          `).join('')}
        </div>
      `,
    }),
    terminal: () => ({
      tag: '[02] PERSONAL TERMINAL',
      title: 'Service Record',
      body: `
        <div class="stat-grid">
          <div class="stat-cell"><div class="stat-label">Lifetime Ops</div><div class="stat-value">${VIEWER.stats.ops}</div></div>
          <div class="stat-cell"><div class="stat-label">Current Campaign</div><div class="stat-value">${VIEWER.stats.currentCampaign}</div></div>
          <div class="stat-cell"><div class="stat-label">aUEC Earned</div><div class="stat-value">${VIEWER.stats.auec.toLocaleString()}</div></div>
          <div class="stat-cell"><div class="stat-label">Awards</div><div class="stat-value">${VIEWER.stats.awards}</div></div>
        </div>
        <p style="color:var(--text-dim);font-size:12px;line-height:1.7;margin:0;">
          Charts coming in Phase 2 — ops over time, payout history, attendance heatmap. Will pull from the live <code style="color:var(--bdc-blue);background:rgba(74,158,255,0.08);padding:1px 6px;border-radius:2px;">/snapshot.json</code> endpoint once we wire it up.
        </p>
      `,
    }),
    window: () => ({
      tag: '[03] BRIDGE WINDOW',
      title: 'Campaign Map',
      body: `
        <div style="text-align:center;padding:30px 10px;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:28px;letter-spacing:0.1em;color:var(--text);margin-bottom:8px;">NO ACTIVE CAMPAIGN</div>
          <div style="font-size:11px;letter-spacing:0.25em;color:var(--text-faint);">Standby — COMMAND will signal the next deployment.</div>
        </div>
        <p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin:18px 0 0;">
          Phase 2: when a campaign is active, this becomes an interactive system map. Pin objectives, see fleet positions, signup for ops without leaving Quarters.
        </p>
      `,
    }),
    notices: () => ({
      tag: '[04] BULKHEAD POSTER',
      title: 'BDC Notices',
      body: `
        <div style="font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;letter-spacing:0.08em;color:var(--text);margin-bottom:4px;">BUILT ON DISCIPLINE</div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:18px;letter-spacing:0.12em;color:var(--bdc-red);margin-bottom:24px;">STRENGTH THROUGH COORDINATION</div>
        <p style="color:var(--text-dim);font-size:13px;line-height:1.7;">
          BlackDiamond Corporation runs structured operations across Stanton and Pyro. Every member has a role, every operation has a brief, every contribution is logged.
        </p>
        <p style="color:var(--text-dim);font-size:13px;line-height:1.7;">
          <strong style="color:var(--text);">Phase 2:</strong> this panel becomes the live announcement board. Officers post via Discord, members read here.
        </p>
      `,
    }),
    mission: () => ({
      tag: '[05] MISSION BOARD',
      title: 'Open Operations',
      body: `
        <div style="font-family:'Rajdhani',sans-serif;font-size:30px;letter-spacing:0.08em;color:var(--text);margin-bottom:4px;">ONE CREW</div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:30px;letter-spacing:0.08em;color:var(--text);margin-bottom:18px;">ONE PURPOSE</div>
        <div style="padding:20px;background:rgba(0,0,0,0.4);border:1px dashed var(--panel-border);text-align:center;color:var(--text-faint);font-size:11px;letter-spacing:0.2em;">
          NO OPS POSTED — CHECK BACK AT 1900 LOCAL
        </div>
        <p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin-top:18px;">
          Future feature: list of scheduled events you can signup for inline. Today, signups happen via <code style="color:var(--bdc-blue);">/event signup</code> in Discord.
        </p>
      `,
    }),
    logbook: () => ({
      tag: '[06] PERSONAL LOG',
      title: 'Campaign Log Book',
      body: `
        <p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin:0 0 16px;">
          A chronological record of every campaign and operation you've participated in.
        </p>
        <div style="padding:20px;background:rgba(0,0,0,0.4);border:1px dashed var(--panel-border);text-align:center;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:6px;">NO ENTRIES</div>
          <div style="font-size:10px;letter-spacing:0.2em;color:var(--text-faint);">Logged ops will appear here</div>
        </div>
      `,
    }),
    shelves: () => ({
      tag: '[07] DISPLAY SHELVING',
      title: 'Collectibles',
      body: `
        <p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin:0 0 16px;">
          Reserved for future cosmetic rewards — event commemoratives, milestone trophies, easter eggs from special ops.
        </p>
        <div style="padding:40px 20px;background:rgba(0,0,0,0.4);border:1px dashed var(--panel-border);text-align:center;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:22px;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:6px;">SHELF EMPTY</div>
          <div style="font-size:10px;letter-spacing:0.2em;color:var(--text-faint);">Collectibles system not deployed</div>
        </div>
      `,
    }),
    command: () => VIEWER.isOfficer ? ({
      tag: '[08] RESTRICTED',
      title: 'Command Deck',
      body: `
        <div style="text-align:center;padding:30px 20px;">
          <div style="font-family:'Rajdhani',sans-serif;font-size:28px;letter-spacing:0.1em;color:var(--bdc-blue);text-shadow:0 0 14px rgba(74,158,255,0.5);margin-bottom:10px;">ACCESS GRANTED</div>
          <div style="font-size:11px;letter-spacing:0.25em;color:var(--text-faint);">Welcome aboard, ${VIEWER.handle}.</div>
        </div>
        <p style="color:var(--text-dim);font-size:13px;line-height:1.7;margin-top:20px;">
          The Command Deck unlocks officer-only tooling — rank management, medal definitions, honorary holders, org config, member promotions, audit log access.
        </p>
        <p style="color:var(--text-dim);font-size:13px;line-height:1.7;">
          <strong style="color:var(--text);">Phase 4:</strong> Currently empty scaffold. Real dashboard arrives once Phase 3 (Discord OAuth) is in place.
        </p>
      `,
    }) : ({
      tag: '[!!] RESTRICTED ACCESS',
      title: 'Command Deck',
      body: `
        <div class="locked-screen">
          <div class="icon">🔒</div>
          <div class="deny">ACCESS DENIED</div>
          <div class="reason">OFFICER CLEARANCE REQUIRED</div>
        </div>
      `,
    }),
  };

  // ---------- render hotspots ----------
  const hotspotLayer = document.getElementById('hotspot-layer');
  const mobileList = document.getElementById('mobile-list');

  for (const h of HOTSPOTS) {
    // desktop hotspot button
    const btn = document.createElement('button');
    btn.className = 'hotspot' + (h.locked ? ' locked' : '');
    btn.style.left = `${h.x}%`;
    btn.style.top = `${h.y}%`;
    btn.style.width = `${h.w}%`;
    btn.style.height = `${h.h}%`;
    btn.dataset.hotspot = h.id;
    btn.dataset.tone = h.tone;
    btn.setAttribute('aria-label', h.label);
    btn.innerHTML = `<span class="hotspot-label">${h.label}</span>`;
    btn.addEventListener('click', () => openHotspot(h.id));
    hotspotLayer.appendChild(btn);

    // mobile tile
    const tile = document.createElement('button');
    tile.className = 'mobile-tile';
    tile.textContent = (h.locked ? '🔒 ' : '') + h.label;
    tile.addEventListener('click', () => openHotspot(h.id));
    mobileList.appendChild(tile);
  }

  // ---------- modal control ----------
  const modalHost   = document.getElementById('modal-host');
  const modalTag    = document.getElementById('modal-tag');
  const modalTitle  = document.getElementById('modal-title');
  const modalBody   = document.getElementById('modal-body');

  function openHotspot(id) {
    const builder = builders[id];
    if (!builder) {
      console.warn(`No builder for hotspot ${id}`);
      return;
    }
    const content = builder();
    modalTag.textContent = content.tag;
    modalTitle.textContent = content.title;
    modalBody.innerHTML = content.body;
    modalHost.classList.add('open');
  }
  function closeModal() {
    modalHost.classList.remove('open');
  }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  modalHost.addEventListener('click', (e) => {
    if (e.target === modalHost) closeModal();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });

  // ---------- ambient parallax ----------
  // Tiny mouse-driven tilt — subtle, doesn't disorient.
  const stage = document.getElementById('room-stage');
  let parallaxOn = window.matchMedia('(min-width: 801px) and (pointer: fine)').matches;
  if (parallaxOn) {
    stage.classList.add('parallax');
    stage.addEventListener('mousemove', (e) => {
      const rect = stage.getBoundingClientRect();
      const dx = (e.clientX - rect.width / 2) / rect.width;   // -0.5 to 0.5
      const dy = (e.clientY - rect.height / 2) / rect.height;
      stage.style.setProperty('--px', `${dx * -16}px`);
      stage.style.setProperty('--py', `${dy * -12}px`);
    });
  }
</script>

</body>
</html>
