<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BDC Quarters</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bdc-blue: #4a9eff;
      --bdc-red: #ff3a3a;
      --safety-orange: #E8652B;
      --bg-deep: #050608;
      --panel: rgba(8, 11, 17, 0.92);
      --panel-border: rgba(74, 158, 255, 0.25);
      --text: #d8dde5;
      --text-dim: #8a93a3;
      --text-faint: #545b69;
      --glow-blue: 0 0 24px rgba(74, 158, 255, 0.65);
      --glow-red: 0 0 24px rgba(255, 58, 58, 0.55);
      --glow-orange: 0 0 24px rgba(232, 101, 43, 0.65);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg-deep);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      overflow: hidden;
      height: 100vh;
    }

    /* ============ ROOM STAGE ============ */
    .room-stage {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }
    .room-bg {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transform: translate(-50%, -50%);
      transition: transform 0.4s cubic-bezier(0.2, 0, 0.2, 1);
      will-change: transform;
    }
    /* subtle parallax — driven by JS reading mouse position */
    .room-stage.parallax .room-bg {
      transform: translate(calc(-50% + var(--px, 0px)), calc(-50% + var(--py, 0px)));
    }

    /* ============ AMBIENT EFFECTS ============ */
    .ambient-layer {
      position: absolute; inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    /* drifting particles inside the window area */
    .window-stars {
      position: absolute;
      left: 40%; top: 10%;
      width: 26%; height: 50%;
      overflow: hidden;
      mask-image: radial-gradient(ellipse at center, black 60%, transparent 100%);
    }
    .window-stars::before, .window-stars::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 80% 20%, rgba(180,200,255,0.7), transparent),
        radial-gradient(1px 1px at 30% 80%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 90% 50%, rgba(200,220,255,0.7), transparent);
      animation: starDrift 60s linear infinite;
    }
    .window-stars::after {
      animation-duration: 90s;
      animation-direction: reverse;
      opacity: 0.6;
    }
    @keyframes starDrift {
      from { transform: translateY(0); }
      to   { transform: translateY(-30px); }
    }
    /* LED flicker overlays positioned on the LED strips */
    .led-flicker {
      position: absolute;
      background: var(--bdc-red);
      opacity: 0;
      mix-blend-mode: screen;
      filter: blur(6px);
      animation: flick 4s infinite;
    }
    .led-flicker-1 { left: 76%; top: 4%;  width: 8%; height: 1%; animation-delay: 0s; }
    .led-flicker-2 { left: 34%; top: 53%; width: 4%; height: 1%; animation-delay: 1.7s; }
    .led-flicker-3 { left: 7%;  top: 4%;  width: 6%; height: 1%; animation-delay: 3.1s; background: var(--bdc-blue); }
    @keyframes flick {
      0%, 60%, 100% { opacity: 0.95; }
      20% { opacity: 0.4; }
      30% { opacity: 0.85; }
      45% { opacity: 0.6; }
      55% { opacity: 0.9; }
    }
    @keyframes hotspot-pulse {
      0%, 92%, 100% { opacity: 0; }
      93%           { opacity: 0.65; }
      94%           { opacity: 0; }
      96%           { opacity: 0.4; }
      97%           { opacity: 0; }
    }

    /* Edit mode (?edit=1) — make hotspots draggable with visible bounds */
    .hotspot.edit-mode {
      cursor: move !important;
      border: 2px solid var(--safety-orange) !important;
      background: rgba(232, 101, 43, 0.12) !important;
      box-shadow: 0 0 14px rgba(232, 101, 43, 0.5) !important;
      transition: none !important;
    }
    .hotspot.edit-mode .hotspot-label {
      opacity: 1 !important;
      color: var(--safety-orange);
      font-weight: 700;
    }
    .edit-coords {
      position: absolute;
      bottom: 2px;
      right: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.08em;
      color: var(--text);
      background: rgba(0,0,0,0.7);
      padding: 1px 6px;
      pointer-events: none;
    }
    .resize-handle {
      position: absolute;
      bottom: -6px; right: -6px;
      width: 14px; height: 14px;
      background: var(--safety-orange);
      border: 2px solid var(--bg);
      cursor: se-resize;
      z-index: 10;
    }
    #edit-toolbar {
      position: fixed;
      bottom: 20px; right: 20px;
      z-index: 9999;
      background: rgba(10, 14, 22, 0.95);
      border: 1px solid var(--safety-orange);
      padding: 14px 18px;
      box-shadow: 0 0 28px rgba(232,101,43,0.4);
      font-family: 'JetBrains Mono', monospace;
    }
    #edit-toolbar button {
      display: block;
      width: 100%;
      padding: 8px 14px;
      background: var(--safety-orange);
      color: #0a0e16;
      border: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      font-weight: 700;
      cursor: pointer;
    }
    #edit-toolbar button:hover { background: #ff7a3d; }
    #edit-toolbar button#edit-exit {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--panel-border);
    }
    #edit-toolbar button#edit-exit:hover {
      color: var(--text);
      border-color: var(--text-dim);
    }

    /* ============ HOTSPOT LAYER ============ */
    .hotspot-layer {
      position: absolute; inset: 0;
      z-index: 2;
    }
    .hotspot {
      position: absolute;
      background: transparent;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.18s ease-out;
      padding: 0;
      border-radius: 3px;
      font-family: inherit;
      color: inherit;
    }
    /* Invisible by default — only the label hint shows on hover */
    .hotspot:hover, .hotspot:focus-visible {
      background: rgba(74, 158, 255, 0.08);
      border-color: rgba(74, 158, 255, 0.7);
      box-shadow: var(--glow-blue), inset 0 0 30px rgba(74, 158, 255, 0.15);
      outline: none;
    }
    .hotspot[data-tone="red"]:hover, .hotspot[data-tone="red"]:focus-visible {
      background: rgba(255, 58, 58, 0.08);
      border-color: rgba(255, 58, 58, 0.7);
      box-shadow: var(--glow-red), inset 0 0 30px rgba(255, 58, 58, 0.12);
    }
    .hotspot[data-tone="orange"]:hover, .hotspot[data-tone="orange"]:focus-visible {
      background: rgba(232, 101, 43, 0.08);
      border-color: rgba(232, 101, 43, 0.7);
      box-shadow: var(--glow-orange), inset 0 0 30px rgba(232, 101, 43, 0.15);
    }
    /* Locked hotspots get a different visual treatment */
    .hotspot.locked::before {
      content: '🔒';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.18s;
    }
    .hotspot.locked:hover::before, .hotspot.locked:focus-visible::before {
      opacity: 0.8;
    }

    /* Hotspot label tooltip */
    .hotspot-label {
      position: absolute;
      bottom: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      padding: 4px 10px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      color: var(--bdc-blue);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      font-weight: 700;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s, transform 0.18s;
    }
    .hotspot[data-tone="red"] .hotspot-label { color: var(--bdc-red); }
    .hotspot[data-tone="orange"] .hotspot-label { color: var(--safety-orange); }
    .hotspot:hover .hotspot-label, .hotspot:focus-visible .hotspot-label {
      opacity: 1;
      transform: translateX(-50%) translateY(-2px);
    }

    /* ============ HUD ============ */
    .hud {
      position: absolute;
      top: 16px; left: 18px;
      z-index: 5;
      display: flex;
      flex-direction: column;
      gap: 2px;
      pointer-events: none;
    }
    .hud-handle {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.1em;
      color: var(--text);
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    .hud-rank {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--bdc-blue);
      text-shadow: 0 0 10px rgba(0,0,0,0.9);
    }
    .hud-link {
      position: absolute;
      top: 16px; right: 18px;
      pointer-events: auto;
      z-index: 5;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      color: var(--text-dim);
      text-decoration: none;
      padding: 6px 14px;
      border: 1px solid var(--panel-border);
      background: rgba(8, 11, 17, 0.7);
      backdrop-filter: blur(4px);
      transition: all 0.18s;
    }
    .hud-link:hover {
      color: var(--bdc-blue);
      border-color: var(--bdc-blue);
      box-shadow: var(--glow-blue);
    }
    .hud-freshness {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      color: var(--text-faint);
      margin-top: 6px;
      cursor: pointer;
      user-select: none;
      transition: color 0.15s;
    }
    .logbook-row.clickable:hover > div {
      background: rgba(74, 158, 255, 0.08) !important;
    }
    .logbook-row.clickable:focus { outline: none; }
    .logbook-row.clickable:focus > div {
      outline: 1px solid var(--bdc-blue);
      outline-offset: 1px;
    }
    .hud-freshness:hover { color: var(--bdc-blue); }
    .hud-freshness.stale { color: #f59e0b; }
    .hud-freshness.refreshing {
      color: var(--text-dim);
      pointer-events: none;
    }
    .hud-switch {
      position: absolute;
      top: 56px; right: 18px;
      pointer-events: auto;
      z-index: 5;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.22em;
      color: var(--text-faint);
      text-decoration: none;
      padding: 5px 12px;
      border: 1px solid var(--panel-border);
      background: rgba(8, 11, 17, 0.55);
      backdrop-filter: blur(4px);
      cursor: pointer;
      transition: all 0.18s;
    }
    .hud-switch:hover {
      color: var(--safety-orange);
      border-color: var(--safety-orange);
      box-shadow: 0 0 14px rgba(232, 101, 43, 0.4);
    }

    /* ============ MODAL ============ */
    .modal-host {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      animation: fadeIn 0.25s ease-out;
    }
    .modal-host.open { display: flex; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      max-width: 920px;
      width: 100%;
      max-height: 88vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 0 1px rgba(74, 158, 255, 0.4),
        0 0 40px rgba(74, 158, 255, 0.15),
        0 20px 60px rgba(0, 0, 0, 0.7);
      position: relative;
    }
    /* Sci-fi corner accents */
    .modal-panel::before, .modal-panel::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border: 2px solid var(--bdc-blue);
      pointer-events: none;
    }
    .modal-panel::before {
      top: -2px; left: -2px;
      border-right: none; border-bottom: none;
    }
    .modal-panel::after {
      bottom: -2px; right: -2px;
      border-left: none; border-top: none;
    }
    .modal-header {
      padding: 16px 22px;
      border-bottom: 1px solid var(--panel-border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: linear-gradient(180deg, rgba(74, 158, 255, 0.06), transparent);
    }
    .modal-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.3em;
      color: var(--bdc-blue);
    }
    .modal-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      flex: 1;
    }
    .modal-close {
      background: none;
      border: 1px solid var(--panel-border);
      color: var(--text-dim);
      width: 30px; height: 30px;
      cursor: pointer;
      font-family: inherit;
      font-size: 16px;
      transition: all 0.15s;
    }
    .modal-close:hover {
      color: var(--bdc-red);
      border-color: var(--bdc-red);
    }
    .modal-body {
      padding: 22px;
      overflow-y: auto;
      flex: 1;
    }
    .modal-footer-note {
      padding: 10px 22px;
      border-top: 1px solid var(--panel-border);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--text-faint);
      background: rgba(0, 0, 0, 0.3);
    }

    /* ============ BOOT OVERLAY (loading / picker / error) ============ */
    .boot-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.94);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .boot-overlay.hidden { display: none; }
    .boot-signin-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 28px;
      background: linear-gradient(180deg, #5865F2 0%, #4752c4 100%);
      border: 1px solid #5865F2;
      color: #fff;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.28em;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 18px rgba(88, 101, 242, 0.4);
    }
    .boot-signin-btn:hover {
      background: linear-gradient(180deg, #6a76f3 0%, #5865F2 100%);
      box-shadow: 0 0 28px rgba(88, 101, 242, 0.7);
      transform: translateY(-1px);
    }
    .boot-panel {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      max-width: 460px;
      width: 100%;
      box-shadow:
        0 0 1px rgba(74, 158, 255, 0.4),
        0 0 40px rgba(74, 158, 255, 0.15),
        0 20px 60px rgba(0, 0, 0, 0.7);
      position: relative;
    }
    .boot-panel::before, .boot-panel::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border: 2px solid var(--bdc-blue);
    }
    .boot-panel::before {
      top: -2px; left: -2px;
      border-right: none; border-bottom: none;
    }
    .boot-panel::after {
      bottom: -2px; right: -2px;
      border-left: none; border-top: none;
    }
    .boot-message {
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.7;
      margin: 0 0 18px;
    }
    .boot-picker {
      display: flex;
      gap: 8px;
      margin: 12px 0 8px;
    }
    .boot-picker input {
      flex: 1;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--panel-border);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      letter-spacing: 0.05em;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    .boot-picker input:focus {
      outline: none;
      border-color: var(--bdc-blue);
      box-shadow: 0 0 16px rgba(74, 158, 255, 0.3);
    }
    .boot-go {
      background: rgba(74, 158, 255, 0.12);
      border: 1px solid var(--bdc-blue);
      color: var(--bdc-blue);
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      padding: 0 18px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .boot-go:hover {
      background: rgba(74, 158, 255, 0.25);
      box-shadow: 0 0 18px rgba(74, 158, 255, 0.4);
    }
    .boot-error {
      padding: 12px 14px;
      background: rgba(255, 58, 58, 0.08);
      border-left: 3px solid var(--bdc-red);
      color: var(--bdc-red);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 12px;
    }
    .boot-help {
      color: var(--text-faint);
      font-size: 10px;
      letter-spacing: 0.2em;
      margin: 14px 0 0;
    }

    /* ============ AWARDS-BY-CATEGORY CHART (terminal) ============ */
    .cat-chart { margin: 14px 0 6px; }
    .cat-row {
      display: grid;
      grid-template-columns: 28px 1fr 36px;
      gap: 10px;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.1em;
      padding: 4px 0;
    }
    .cat-row .cat-key {
      color: var(--bdc-blue);
      font-weight: 700;
    }
    .cat-row .cat-bar {
      height: 8px;
      background: rgba(0,0,0,0.5);
      border: 1px solid var(--panel-border);
      position: relative;
      overflow: hidden;
    }
    .cat-row .cat-bar-fill {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      background: linear-gradient(90deg, var(--bdc-blue), rgba(74,158,255,0.6));
      box-shadow: 0 0 8px rgba(74,158,255,0.5);
    }
    .cat-row .cat-val {
      text-align: right;
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      font-size: 16px;
      font-weight: 700;
    }

    /* Modal content shared */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-cell {
      padding: 14px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid var(--panel-border);
      text-align: center;
    }
    .stat-label {
      font-size: 9px;
      letter-spacing: 0.25em;
      color: var(--text-faint);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: 'Rajdhani', sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--bdc-blue);
    }
    .placeholder-note {
      padding: 16px;
      background: rgba(232, 101, 43, 0.08);
      border-left: 3px solid var(--safety-orange);
      color: var(--text-dim);
      font-size: 12px;
      line-height: 1.6;
      margin-top: 18px;
    }
    .placeholder-note strong { color: var(--safety-orange); }

    /* Medal grid for the vault */
    .medal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 14px;
    }
    .medal-cell {
      padding: 10px;
      background: rgba(0, 0, 0, 0.45);
      border: 1px solid var(--panel-border);
      text-align: center;
      transition: transform 0.15s, border-color 0.15s;
    }
    .medal-cell.owned { border-color: rgba(232, 101, 43, 0.5); }
    .medal-cell.locked { opacity: 0.32; }
    .medal-cell:hover { transform: translateY(-2px); border-color: var(--bdc-blue); }
    .medal-cell img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      display: block;
    }
    .medal-cell .medal-name {
      font-size: 10px;
      letter-spacing: 0.1em;
      margin-top: 6px;
      color: var(--text);
    }
    .medal-cell .medal-status {
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--text-faint);
      margin-top: 2px;
    }
    .medal-cell.owned .medal-status { color: var(--safety-orange); }

    /* Lock-out screen for command deck */
    .locked-screen {
      text-align: center;
      padding: 40px 20px;
    }
    .locked-screen .icon {
      font-size: 56px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 10px rgba(255, 58, 58, 0.6));
    }
    .locked-screen .deny {
      font-family: 'Rajdhani', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--bdc-red);
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .locked-screen .reason {
      color: var(--text-dim);
      font-size: 12px;
      letter-spacing: 0.15em;
    }

    /* ============ MOBILE FALLBACK ============ */
    .mobile-list {
      display: none;
    }
    @media (max-width: 800px) {
      html, body { overflow: auto; height: auto; }
      .room-stage {
        height: auto;
        aspect-ratio: 1672 / 941;
      }
      .room-bg {
        position: relative;
        top: auto; left: auto;
        transform: none;
        width: 100%;
        height: auto;
      }
      .hotspot-layer { display: none; }
      .hud-link { font-size: 10px; padding: 4px 8px; }
      .mobile-list {
        display: grid;
        gap: 10px;
        padding: 18px;
        grid-template-columns: repeat(2, 1fr);
        background: var(--bg-deep);
      }
      .mobile-tile {
        padding: 18px 14px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        color: var(--text);
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        letter-spacing: 0.2em;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
      }
      .mobile-tile:hover { border-color: var(--bdc-blue); color: var(--bdc-blue); }
      .modal-panel { max-height: 92vh; }
    }
  </style>
</head>
<body>

<div class="room-stage" id="room-stage">
  <img class="room-bg" src="assets/quarters/room-bg.png" alt="BDC Quarters">

  <div class="ambient-layer">
    <div class="window-stars"></div>
    <div class="led-flicker led-flicker-1"></div>
    <div class="led-flicker led-flicker-2"></div>
    <div class="led-flicker led-flicker-3"></div>
  </div>

  <div class="hotspot-layer" id="hotspot-layer"></div>

  <div class="hud">
    <div class="hud-handle" id="hud-handle">RAGINXPANDA</div>
    <div class="hud-rank" id="hud-rank">▸ FLEET ADMIRAL · BLACKDIAMOND CORP</div>
    <div class="hud-freshness" id="hud-freshness" title="Click to refresh"></div>
  </div>
  <a class="hud-link" href="./">← TRACKER</a>
  <button class="hud-switch" id="hud-switch" type="button" title="Pick a different crew member">↔ SWITCH</button>
</div>

<div class="mobile-list" id="mobile-list"></div>

<div class="modal-host" id="modal-host">
  <div class="modal-panel" id="modal-panel">
    <div class="modal-header">
      <span class="modal-tag" id="modal-tag">[01]</span>
      <div class="modal-title" id="modal-title">…</div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer-note" id="modal-footer">PHASE 2 · LIVE DATA</div>
  </div>
</div>

<!-- Boot overlay — shows while snapshot loads, on errors, and as the handle picker if no ?member= in URL or handle isn't found. -->
<div class="boot-overlay" id="boot-overlay">
  <div class="boot-panel">
    <div class="modal-header">
      <span class="modal-tag" id="boot-tag">[QUARTERS DECK]</span>
      <div class="modal-title" id="boot-title">Connecting…</div>
    </div>
    <div class="modal-body">
      <p class="boot-message" id="boot-message">Loading roster from Carbon-12…</p>
      <div class="boot-picker" id="boot-picker" style="display:none;">
        <input
          type="text"
          id="picker-input"
          list="picker-handles"
          placeholder="Type your handle…"
          autocomplete="off"
          spellcheck="false"
        >
        <datalist id="picker-handles"></datalist>
        <button class="boot-go" id="boot-go">ENTER →</button>
      </div>
      <div class="boot-error" id="boot-error" style="display:none;"></div>
      <p class="boot-help" id="boot-help"></p>
    </div>
  </div>
</div>

<script>
  // ============================================================
  // BDC QUARTERS  ·  interactive sci-fi profile room
  //
  // Phase 1: standalone scaffold with placeholder data. Click any
  // object in the room, get a themed modal. No backend, no auth,
  // just visuals + interactions.
  //
  // Phase 2 (next): wire to /snapshot.json so the data is real,
  // pulling the current viewer's stats + medals.
  //
  // Phase 3: Discord OAuth — replace the hardcoded RaginXPanda
  // identity with the actual signed-in user.
  // ============================================================

  // ---------- snapshot + mutable viewer state -----------------------------
  const API_BASE     = 'https://api.blkdiamondcorporation.com';
  const SNAPSHOT_URL = `${API_BASE}/orgs/BDC/snapshot.json`;
  const AUTH_ME_URL  = `${API_BASE}/auth/me`;
  const AUTH_LOGIN   = `${API_BASE}/auth/login`;
  const AUTH_LOGOUT  = `${API_BASE}/auth/logout`;

  let snapshot = null;                  // org snapshot once loaded
  let session  = null;                  // { discordId, username, avatar } if signed in
  let viewer = {                        // resolved from auth + optional ?member= override
    handle: '—',
    rank: '—',
    rankCode: 'CRM',
    isOfficer: false,
    member: null,                       // raw roster row, populated after fetch
  };

  // ---------- helpers -----------------------------------------------------
  function isOfficerRank(rankCode) {
    return ['LT', 'CAP', 'ADM', 'FADM'].includes((rankCode ?? '').toUpperCase());
  }

  /** Bronze/Silver/Diamond tier device for a given stack count.
   *  Same logic as the main tracker so visuals stay consistent. */
  function pickDevice(count) {
    if (!Number.isFinite(count) || count <= 1) return { device: null, tier: null };
    if (count <= 4)  return { device: `Bronze_${count - 1}`,  tier: 'Bronze'  };
    if (count <= 7)  return { device: `Silver_${count - 4}`,  tier: 'Silver'  };
    if (count <= 10) return { device: `Diamond_${count - 7}`, tier: 'Diamond' };
    return { device: 'Diamond_3', tier: 'Diamond' };
  }

  function findMember(handle) {
    if (!snapshot || !handle) return null;
    const q = handle.toLowerCase();
    return snapshot.roster.find((m) => (m.handle ?? '').toLowerCase() === q) ?? null;
  }

  /** Build a Map<code, { count, honorary, def }> of medals THIS viewer holds.
   *  Honorary entries come from medalDefinitions[i].honoraryHolders, real
   *  grants come from member.awards (one row per grant, aggregated here). */
  function computeOwnership() {
    const map = new Map();
    if (!snapshot || !viewer.member) return map;
    const handleLower = (viewer.member.handle ?? '').toLowerCase();
    const defByCode = new Map(snapshot.medalDefinitions.map((d) => [d.code, d]));

    // Real grants: count occurrences of each code in member.awards
    for (const a of (viewer.member.awards ?? [])) {
      if (!defByCode.has(a.code)) continue;
      const prev = map.get(a.code) ?? { count: 0, honorary: false, def: defByCode.get(a.code) };
      prev.count += 1;
      map.set(a.code, prev);
    }
    // Honorary grants from medal definitions (skip if member has real grant)
    for (const def of snapshot.medalDefinitions) {
      const honList = def.honoraryHolders ?? [];
      const isHonorary = honList.some((h) => (h ?? '').toLowerCase() === handleLower);
      if (isHonorary && !map.has(def.code)) {
        map.set(def.code, { count: 0, honorary: true, def });
      }
    }
    return map;
  }

  function fmtAuec(n) {
    return Number(n ?? 0).toLocaleString('en-US');
  }

  // ---------- hotspot definitions -----------------------------------------
  // Positions are % of room background. Tune one number per row, no other
  // changes needed. Command Deck is locked unless viewer is an officer.
  const HOTSPOTS = [
    { id: 'medals',   label: 'MEDAL VAULT',    x: 2.0,  y: 8.0,  w: 26.8, h: 46.9, tone: 'blue'   },
    { id: 'notices',  label: 'BDC NOTICES',    x: 31.2, y: 16.7, w: 8.4,  h: 28.4, tone: 'red'    },
    { id: 'window',   label: 'CAMPAIGN MAP',   x: 44.1, y: 11.2, w: 25.6, h: 39.5, tone: 'blue'   },
    { id: 'mission',  label: 'MISSION BOARD',  x: 72.2, y: 8.3,  w: 16.0, h: 29.4, tone: 'red'    },
    { id: 'terminal', label: 'PERSONAL STATS', x: 71.8, y: 39.2, w: 12.3, h: 11.5, tone: 'blue'   },
    { id: 'logbook',  label: 'CAMPAIGN LOG',   x: 72.8, y: 73.9, w: 12.7, h: 22.1, tone: 'orange' },
    { id: 'shelves',  label: 'COLLECTIBLES',   x: 89.0, y: 7.0,  w: 11.0, h: 53.4, tone: 'blue'   },
    { id: 'command',  label: 'COMMAND DECK',   x: 95.0, y: 2.0,  w: 5.0,  h: 7.0,  tone: 'red',  locked: true },
  ];

  // ---------- modal content builders (using real data) --------------------
  const builders = {
    medals: () => {
      const ownership = computeOwnership();
      const defs = snapshot?.medalDefinitions ?? [];
      const ownedCount = ownership.size;

      const cells = defs.map((def) => {
        const own = ownership.get(def.code);
        if (!own) {
          return `<div class="medal-cell locked" data-medal-code="${def.code}">
            <img src="assets/medals-v2/${def.code}.png" alt="${def.name}" loading="lazy">
            <div class="medal-name">${def.name}</div>
            <div class="medal-status">LOCKED</div>
          </div>`;
        }
        let statusText, deviceOverlay = '';
        if (own.honorary) {
          statusText = 'HONORARY';
        } else {
          const { device, tier } = pickDevice(own.count);
          statusText = `× ${own.count}${tier ? ` · ${tier.toUpperCase()}` : ''}`;
          if (device) {
            deviceOverlay = `<img src="assets/medals-v2/devices/${device}.png" alt="" style="position:absolute;top:14.5%;left:50%;transform:translate(-50%,-50%);width:38%;pointer-events:none;">`;
          }
        }
        return `<div class="medal-cell owned" data-medal-code="${def.code}">
          <div style="position:relative;">
            <img src="assets/medals-v2/${def.code}.png" alt="${def.name}" loading="lazy" style="display:block;">
            ${deviceOverlay}
          </div>
          <div class="medal-name">${def.name}</div>
          <div class="medal-status">${statusText}</div>
        </div>`;
      }).join('');

      return {
        tag: '[01] WALL DISPLAY',
        title: `Medal Vault · ${ownedCount} of ${defs.length}`,
        body: `<p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin:0 0 16px;">
          Every medal in the org catalog. <span style="color:var(--safety-orange);">Glowing cells</span> are yours.
          <span style="display:block;font-size:10px;letter-spacing:0.2em;color:var(--text-faint);margin-top:6px;">▸ CLICK ANY MEDAL FOR DETAILS</span>
        </p>
        <div class="medal-grid">${cells}</div>`,
      };
    },

    medalDetail: (def) => {
      const own = computeOwnership().get(def.code);
      const defs = snapshot?.medalDefinitions ?? [];

      // Org-wide rarity: how many people hold this medal (real grants + honoraries)
      let holderCount = 0;
      const honList = def.honoraryHolders ?? [];
      const honSet = new Set(honList.map((h) => (h ?? '').toLowerCase()));
      const realHolders = new Set();
      for (const m of (snapshot?.roster ?? [])) {
        const has = (m.awards ?? []).some((a) => a.code === def.code);
        if (has) realHolders.add((m.handle ?? '').toLowerCase());
      }
      const combined = new Set([...realHolders, ...honSet]);
      holderCount = combined.size;
      const rosterSize = (snapshot?.roster ?? []).length || 1;
      const rarityPct = ((holderCount / rosterSize) * 100).toFixed(0);
      const rarityLabel =
        holderCount <= 3 ? 'RARE' :
        holderCount <= 10 ? 'UNCOMMON' :
        'COMMON';
      const rarityColor =
        rarityLabel === 'RARE'     ? 'var(--safety-orange)' :
        rarityLabel === 'UNCOMMON' ? '#f5b342' :
                                     'var(--text-faint)';

      // Tier device for big art (if multi-owned)
      let bigDeviceOverlay = '';
      if (own && !own.honorary) {
        const { device } = pickDevice(own.count);
        if (device) {
          bigDeviceOverlay = `<img src="assets/medals-v2/devices/${device}.png" alt="" style="position:absolute;top:14.5%;left:50%;transform:translate(-50%,-50%);width:34%;pointer-events:none;">`;
        }
      }

      // Grant history (real grants only — honoraries have no dates)
      const memberAwards = (viewer.member?.awards ?? []).filter((a) => a.code === def.code);
      const grantList = memberAwards.length
        ? `<div style="margin-top:18px;">
             <div style="font-size:10px;letter-spacing:0.25em;color:var(--text-faint);margin-bottom:8px;">▸ YOUR GRANTS</div>
             ${memberAwards.map((a) => {
               const date = a.awarded_at ? new Date(a.awarded_at).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '—';
               const reason = a.reason ? `<div style="color:var(--text-dim);font-size:11px;line-height:1.5;margin-top:3px;font-style:italic;">"${a.reason}"</div>` : '';
               return `<div style="padding:8px 12px;background:rgba(0,0,0,0.4);border-left:2px solid var(--bdc-blue);margin-bottom:6px;">
                 <div style="font-size:11px;letter-spacing:0.1em;color:var(--text);">${date}</div>
                 ${reason}
               </div>`;
             }).join('')}
           </div>`
        : (own?.honorary
            ? `<div style="margin-top:18px;padding:14px;background:rgba(232,101,43,0.08);border-left:3px solid var(--safety-orange);">
                 <div style="font-size:11px;letter-spacing:0.2em;color:var(--safety-orange);">HONORARY HOLDER</div>
                 <div style="color:var(--text-dim);font-size:11px;line-height:1.5;margin-top:4px;">No grant date on record — bestowed in recognition outside the standard system.</div>
               </div>`
            : '');

      const statusBadge = own
        ? (own.honorary
            ? `<span style="padding:4px 10px;background:rgba(232,101,43,0.15);border:1px solid var(--safety-orange);color:var(--safety-orange);font-size:10px;letter-spacing:0.2em;">HONORARY</span>`
            : `<span style="padding:4px 10px;background:rgba(74,158,255,0.12);border:1px solid var(--bdc-blue);color:var(--bdc-blue);font-size:10px;letter-spacing:0.2em;">× ${own.count} HELD</span>`)
        : `<span style="padding:4px 10px;background:rgba(0,0,0,0.4);border:1px solid var(--panel-border);color:var(--text-faint);font-size:10px;letter-spacing:0.2em;">LOCKED</span>`;

      return {
        tag: '[01] MEDAL DETAIL',
        title: def.name,
        body: `<button data-action="back-to-vault" style="background:none;border:1px solid var(--panel-border);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;padding:5px 12px;cursor:pointer;margin-bottom:18px;transition:all 0.15s;">← BACK TO VAULT</button>

          <div style="display:grid;grid-template-columns:160px 1fr;gap:24px;align-items:start;">
            <div style="position:relative;${own ? '' : 'opacity:0.32;'}">
              <img src="assets/medals-v2/${def.code}.png" alt="${def.name}" style="width:100%;display:block;">
              ${bigDeviceOverlay}
            </div>
            <div>
              <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;">
                <span style="padding:4px 10px;background:rgba(0,0,0,0.4);border:1px solid var(--panel-border);color:var(--text-dim);font-size:10px;letter-spacing:0.2em;">CAT ${def.category ?? '?'}</span>
                <span style="padding:4px 10px;background:rgba(0,0,0,0.4);border:1px solid ${rarityColor};color:${rarityColor};font-size:10px;letter-spacing:0.2em;">${rarityLabel} · ${holderCount}/${rosterSize}</span>
                ${statusBadge}
              </div>
              ${def.description ? `<p style="color:var(--text);font-size:13px;line-height:1.7;margin:0 0 10px;">${def.description}</p>` : ''}
              ${def.criteria ? `<p style="color:var(--text-dim);font-size:11px;line-height:1.6;margin:0;"><span style="color:var(--text-faint);font-size:10px;letter-spacing:0.2em;">▸ AWARDED FOR</span><br>${def.criteria}</p>` : ''}
            </div>
          </div>
          ${grantList}`,
      };
    },

    terminal: () => {
      const m = viewer.member ?? {};
      const ownership = computeOwnership();
      const catCounts = new Map();
      for (const [, info] of ownership) {
        const cat = info.def?.category ?? '?';
        catCounts.set(cat, (catCounts.get(cat) ?? 0) + 1);
      }
      const cats = [...catCounts.entries()].sort((a, b) => b[1] - a[1]);
      const maxCat = Math.max(1, ...cats.map(([, n]) => n));
      const catBars = cats.length
        ? cats.map(([cat, n]) => `<div class="cat-row">
            <span class="cat-key">${cat}</span>
            <div class="cat-bar"><div class="cat-bar-fill" style="width:${(n / maxCat) * 100}%;"></div></div>
            <span class="cat-val">${n}</span>
          </div>`).join('')
        : `<p style="color:var(--text-faint);font-size:11px;letter-spacing:0.2em;text-align:center;padding:16px;">NO MEDALS YET</p>`;

      const opsLifetime = m.totalOpsAttended ?? 0;
      const opsCurrent  = m.currentCampaignOps ?? 0;
      const auec        = m.totalPayoutsAuec ?? 0;
      const awardCount  = ownership.size;

      return {
        tag: '[02] PERSONAL TERMINAL',
        title: 'Service Record',
        body: `<div class="stat-grid">
          <div class="stat-cell"><div class="stat-label">Lifetime Ops</div><div class="stat-value">${opsLifetime}</div></div>
          <div class="stat-cell"><div class="stat-label">Current Campaign</div><div class="stat-value">${opsCurrent}</div></div>
          <div class="stat-cell"><div class="stat-label">aUEC Earned</div><div class="stat-value">${fmtAuec(auec)}</div></div>
          <div class="stat-cell"><div class="stat-label">Awards</div><div class="stat-value">${awardCount}</div></div>
        </div>
        <div style="font-size:10px;letter-spacing:0.25em;color:var(--text-faint);margin-top:14px;">▸ AWARDS BY CATEGORY</div>
        <div class="cat-chart">${catBars}</div>`,
      };
    },

    // Sub-view: rendered when a Campaign Log entry with an AAR is
    // clicked. Receives the eventHistory entry directly so we don't
    // re-query the snapshot.
    aarDetail: (op) => {
      const aar = op.aar;
      const d = new Date(op.startsAt);
      const dateStr = d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
      const filedDate = new Date(aar.filedAt).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });

      const section = (label, text, accent) => {
        if (!text || !String(text).trim()) return '';
        return `<div style="margin-bottom:18px;">
          <div style="font-size:10px;letter-spacing:0.25em;color:${accent};margin-bottom:6px;">▸ ${label}</div>
          <div style="color:var(--text);font-size:12.5px;line-height:1.65;white-space:pre-wrap;">${
            String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
          }</div>
        </div>`;
      };

      return {
        tag: '[06] AFTER-ACTION REPORT',
        title: op.title,
        body:
          `<button data-action="back-to-log" style="background:none;border:1px solid var(--panel-border);color:var(--text-dim);font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;padding:5px 12px;cursor:pointer;margin-bottom:18px;">← BACK TO LOG</button>
          <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--panel-border);flex-wrap:wrap;gap:8px;">
            <div style="font-size:11px;letter-spacing:0.18em;color:var(--text-dim);">▸ OP DATE · ${dateStr}</div>
            <div style="font-size:10px;letter-spacing:0.18em;color:var(--text-faint);">FILED ${filedDate} BY ${aar.filedBy ?? 'unknown'}</div>
          </div>` +
          section('SUMMARY',        aar.summary,      'var(--bdc-blue)') +
          section('WHAT WENT WELL', aar.wentWell,     '#10b981') +
          section('COULD IMPROVE',  aar.couldImprove, '#f59e0b') +
          section('CASUALTIES',     aar.casualties,   'var(--safety-orange)') +
          section('KEY TAKEAWAYS',  aar.takeaways,    'var(--bdc-blue)'),
      };
    },

    window: () => {
      const camp = snapshot?.currentCampaign;
      if (!camp) {
        return {
          tag: '[03] BRIDGE WINDOW',
          title: 'Campaign Map',
          body: `<div style="text-align:center;padding:30px 10px;">
            <div style="font-family:'Rajdhani',sans-serif;font-size:28px;letter-spacing:0.1em;color:var(--text);margin-bottom:8px;">NO ACTIVE CAMPAIGN</div>
            <div style="font-size:11px;letter-spacing:0.25em;color:var(--text-faint);">Standby — COMMAND will signal the next deployment.</div>
          </div>`,
        };
      }
      return {
        tag: '[03] BRIDGE WINDOW',
        title: 'Campaign Map',
        body: `<div style="font-family:'Rajdhani',sans-serif;font-size:30px;letter-spacing:0.06em;color:var(--text);margin-bottom:6px;">${camp.name ?? 'Active Campaign'}</div>
        <div style="font-size:11px;letter-spacing:0.25em;color:var(--bdc-blue);margin-bottom:18px;">▸ ${(camp.status ?? 'ACTIVE').toUpperCase()}</div>
        ${camp.description ? `<p style="color:var(--text-dim);font-size:13px;line-height:1.7;">${camp.description}</p>` : ''}
        <p style="color:var(--text-dim);font-size:12px;line-height:1.6;margin-top:18px;">Interactive system map arrives in a future phase — for now, sign up via <code style="color:var(--bdc-blue);">/event signup</code> in Discord.</p>`,
      };
    },

    notices: () => {
      const items = snapshot?.notices ?? [];

      // Header tagline stays — Cody specifically liked this look
      const header = `<div style="font-family:'Rajdhani',sans-serif;font-size:32px;font-weight:700;letter-spacing:0.08em;color:var(--text);margin-bottom:4px;">BUILT ON DISCIPLINE</div>
        <div style="font-family:'Rajdhani',sans-serif;font-size:18px;letter-spacing:0.12em;color:var(--bdc-red, var(--safety-orange));margin-bottom:24px;">STRENGTH THROUGH COORDINATION</div>`;

      if (items.length === 0) {
        return {
          tag: '[04] BULKHEAD POSTER',
          title: 'BDC Notices',
          body: header + `<p style="color:var(--text-dim);font-size:13px;line-height:1.7;">BlackDiamond Corporation runs structured operations across Stanton and Pyro. Every member has a role, every operation has a brief, every contribution is logged.</p>
            <div style="margin-top:22px;padding:14px;background:rgba(0,0,0,0.4);border:1px dashed var(--panel-border);text-align:center;color:var(--text-faint);font-size:10px;letter-spacing:0.18em;">
              ▸ NO ACTIVE NOTICES
              <div style="margin-top:5px;color:var(--text-dim);font-size:10px;letter-spacing:0.14em;">officers can post via <span style="color:var(--bdc-blue);">/notices post</span></div>
            </div>`,
        };
      }

      const noticeCards = items.map((n) => {
        const date = new Date(n.postedAt).toLocaleDateString(undefined, { month:'short', day:'numeric', year:'numeric' });
        const expBadge = n.expiresAt
          ? `<span style="margin-left:8px;padding:2px 7px;background:rgba(245,158,11,0.12);border:1px solid #f59e0b;color:#f59e0b;font-size:9px;letter-spacing:0.18em;">EXPIRES ${new Date(n.expiresAt).toLocaleDateString(undefined,{month:'short',day:'numeric'})}</span>`
          : '';
        const body = (n.body ?? '').replace(/\n/g, '<br>');
        return `<div style="padding:14px 16px;background:rgba(0,0,0,0.4);border-left:3px solid var(--safety-orange);margin-bottom:12px;">

  // ---------- render: HUD + hotspots -------------------------------------

  // --- Snapshot freshness indicator ------------------------------------
  // Members shouldn't have to guess if their data is live or 30min stale.
  // Show relative time since the snapshot was generated; tinted amber
  // after 10min as a soft "consider refreshing" cue. Clicking refetches.
  function fmtRelativeTime(iso) {
    if (!iso) return 'unknown';
    const secs = Math.floor((Date.now() - new Date(iso).getTime()) / 1000);
    if (secs < 60)    return `${secs}s ago`;
    if (secs < 3600)  return `${Math.floor(secs / 60)}m ago`;
    if (secs < 86400) return `${Math.floor(secs / 3600)}h ago`;
    return `${Math.floor(secs / 86400)}d ago`;
  }
  function renderFreshness() {
    const el = document.getElementById('hud-freshness');
    if (!el || !snapshot?.lastUpdated) return;
    const secs = Math.floor((Date.now() - new Date(snapshot.lastUpdated).getTime()) / 1000);
    el.textContent = `▸ DATA ${fmtRelativeTime(snapshot.lastUpdated).toUpperCase()} · CLICK TO REFRESH`;
    el.classList.toggle('stale', secs > 600); // amber after 10min
  }
  // Tick the relative time once a minute so it stays current without
  // refetching. Cheap — only updates the text node.
  setInterval(renderFreshness, 60_000);
  document.getElementById('hud-freshness').addEventListener('click', async () => {
    const el = document.getElementById('hud-freshness');
    el.classList.add('refreshing');
    el.textContent = '▸ REFRESHING…';
    try {
      const res = await fetch(SNAPSHOT_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      snapshot = await res.json();
      // Re-resolve viewer in case their rank / awards / hangar changed
      if (viewer.member) {
        const refreshed = findMemberByDiscordId(session?.discordId)
          ?? findMember(viewer.member.handle);
        if (refreshed) resolveViewerFromMember(refreshed);
      }
      renderHUD();
    } catch (err) {
      console.error('[freshness] refresh failed', err);
      el.textContent = '▸ REFRESH FAILED · CLICK TO RETRY';
    } finally {
      el.classList.remove('refreshing');
    }
  });

  const _editParam = new URLSearchParams(window.location.search).get('edit');
  const EDIT_MODE = _editParam !== null && _editParam !== '0' && _editParam !== 'false';
  if (EDIT_MODE) console.log('[quarters] edit mode active — drag/resize hotspots, then click COPY in the toolbar');

  function renderHotspots() {
    hotspotLayer.innerHTML = '';
    mobileList.innerHTML = '';
    for (const h of HOTSPOTS) {
      const isLocked = h.locked && !viewer.isOfficer;
      const btn = document.createElement('button');

      btn.style.left = `${h.x}%`;

          `<span class="resize-handle" data-dir="se"></span>`;
        attachDragResize(btn, h);

        btn.innerHTML = `<span class="hotspot-label">${h.label}</span>`;

  // Drag = move the box. Drag the SE corner handle = resize. Both
  // operate in % of the stage so coords stay device-independent.
  function attachDragResize(btn, h) {
    const stage = document.getElementById('room-stage');
    let dragMode = null;       // 'move' | 'resize'
    let startX, startY;
    let origX, origY, origW, origH;

    btn.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('resize-handle')) {
        dragMode = 'resize';
      } else {
        dragMode = 'move';
      }
      e.preventDefault();
      e.stopPropagation();
      const rect = stage.getBoundingClientRect();
      startX = e.clientX;
      startY = e.clientY;
      origX = h.x; origY = h.y; origW = h.w; origH = h.h;

      const onMove = (ev) => {
        const dxPct = ((ev.clientX - startX) / rect.width)  * 100;
        const dyPct = ((ev.clientY - startY) / rect.height) * 100;
        if (dragMode === 'move') {
          h.x = Math.max(0, Math.min(100 - h.w, origX + dxPct));
          h.y = Math.max(0, Math.min(100 - h.h, origY + dyPct));
          btn.style.left = `${h.x.toFixed(1)}%`;
          btn.style.top  = `${h.y.toFixed(1)}%`;
        } else {
          h.w = Math.max(2, Math.min(100 - h.x, origW + dxPct));
          h.h = Math.max(2, Math.min(100 - h.y, origH + dyPct));
          btn.style.width  = `${h.w.toFixed(1)}%`;
          btn.style.height = `${h.h.toFixed(1)}%`;
        }
        btn.querySelector('.edit-coords').textContent =
          `${h.x.toFixed(1)},${h.y.toFixed(1)} · ${h.w.toFixed(1)}×${h.h.toFixed(1)}`;
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        dragMode = null;
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  }

  function mountEditToolbar() {
    if (document.getElementById('edit-toolbar')) return;
    const bar = document.createElement('div');
    bar.id = 'edit-toolbar';
    bar.innerHTML = `
      <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.18em;color:var(--text-faint);margin-bottom:8px;">▸ EDIT MODE</div>

      <div style="margin-top:8px;font-size:10px;color:var(--text-dim);line-height:1.5;">
        Drag any box to move. Drag the SE corner to resize.
      </div>`;
    document.body.appendChild(bar);
    document.getElementById('edit-copy').addEventListener('click', copyHotspots);
    document.getElementById('edit-exit').addEventListener('click', () => {
      window.location.href = window.location.pathname;

  function copyHotspots() {
    const text = 'const HOTSPOTS = [\n' + HOTSPOTS.map((h) => {
      const lock = h.locked ? ', locked: true' : '';
      return `  { id: '${h.id}', label: '${h.label}', x: ${h.x.toFixed(1)}, y: ${h.y.toFixed(1)}, w: ${h.w.toFixed(1)}, h: ${h.h.toFixed(1)}, tone: '${h.tone}'${lock} },`;
    }).join('\n') + '\n];';
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('edit-copy');
      const orig = btn.textContent;
      btn.textContent = '✓ COPIED — paste in chat';
      setTimeout(() => { btn.textContent = orig; }, 2000);
    });
  }

  // Delegated clicks inside the modal body — wires medal-vault → detail
  // navigation without re-registering listeners on every modal render.
  modalBody.addEventListener('click', (e) => {
    // Back to vault button
    const back = e.target.closest('[data-action="back-to-vault"]');
    if (back) {
      openHotspot('medals');
      return;
    }
    // Back to campaign log button (from AAR detail)
    const backLog = e.target.closest('[data-action="back-to-log"]');
    if (backLog) {
      openHotspot('logbook');
      return;
    }
    // Clicked a medal cell — open its detail view

    if (cell) {
      const code = cell.dataset.medalCode;
      const def = (snapshot?.medalDefinitions ?? []).find((d) => d.code === code);
      if (!def) return;
      const content = builders.medalDetail(def);
      modalTag.textContent = content.tag;
      modalTitle.textContent = content.title;
      modalBody.innerHTML = content.body;
      return;
    }
    // Clicked an op row in the Campaign Log that has an AAR
    const row = e.target.closest('.logbook-row.clickable[data-event-id]');
    if (row) {
      const eventId = Number(row.dataset.eventId);
      const op = (viewer.member?.eventHistory ?? []).find((x) => x.eventId === eventId);
      if (!op?.aar) return;
      const content = builders.aarDetail(op);

      modalBody.innerHTML = content.body;

    bootError.style.display = '';
    bootError.textContent = msg;
    bootHelp.innerHTML = '<a href="javascript:location.reload()" style="color:var(--bdc-blue);text-decoration:none;letter-spacing:0.2em;">↻ RETRY</a> · <a href="./" style="color:var(--text-dim);text-decoration:none;letter-spacing:0.2em;">← TRACKER</a>';
    bootOverlay.classList.remove('hidden');
  }
  function showBootPicker(reason) {
    bootTitle.textContent = 'Crew Preview';
    bootMessage.style.display = '';
    bootMessage.textContent = reason === 'not_found'
      ? `Handle not in the roster. Pick from the list below.`
      : `Type or pick a handle to preview that member's quarters.`;
    bootPicker.style.display = 'flex';
    bootError.style.display = 'none';
    bootHelp.innerHTML = '<a href="./" style="color:var(--text-dim);text-decoration:none;letter-spacing:0.2em;">← BACK TO TRACKER</a>';
    pickerHandles.innerHTML = (snapshot?.roster ?? [])
      .map((m) => `<option value="${m.handle}">`)
      .join('');
    pickerInput.value = '';
    bootOverlay.classList.remove('hidden');
    setTimeout(() => pickerInput.focus(), 50);
  }

  // Sign-in prompt when no session exists. The Discord OAuth flow handles
  // the rest — server redirects back to /quarters.html with a cookie set.
  function showBootSignIn() {
    bootTitle.textContent = 'Authentication Required';
    bootMessage.style.display = '';
    bootMessage.innerHTML =
      'Personal quarters are restricted to verified BlackDiamond crew. ' +
      'Sign in with Discord to enter your quarters.';
    bootPicker.style.display = 'none';
    bootError.style.display = 'none';
    bootHelp.innerHTML =
      `<a href="${AUTH_LOGIN}" class="boot-signin-btn">
         <span style="font-size:18px;line-height:1;">▸</span>
         <span>SIGN IN WITH DISCORD</span>
       </a>
       <div style="margin-top:14px;font-size:10px;letter-spacing:0.2em;color:var(--text-faint);">
         <a href="./" style="color:var(--text-faint);text-decoration:none;">← BACK TO TRACKER</a>
       </div>`;
    bootOverlay.classList.remove('hidden');
  }

  // Signed in but the Discord user isn't on the BDC roster — show
  // verify instructions instead of dumping them into a stranger's room.
  function showBootNotOnRoster() {
    bootTitle.textContent = 'Not on the Roster';
    bootMessage.style.display = '';
    bootMessage.innerHTML =
      `Signed in as <strong style="color:var(--bdc-blue);">${session.username}</strong>, ` +
      'but this Discord account isn\'t verified in BlackDiamond Corporation yet. ' +
      'Run <code style="color:var(--safety-orange);">/verify start</code> in the BDC Discord ' +
      'to link your RSI account and gain access.';
    bootPicker.style.display = 'none';
    bootError.style.display = 'none';
    bootHelp.innerHTML =
      `<button type="button" id="boot-signout" class="boot-signin-btn" style="background:transparent;border:1px solid var(--panel-border);color:var(--text-dim);">
         <span>SIGN OUT</span>
       </button>
       <div style="margin-top:14px;font-size:10px;letter-spacing:0.2em;color:var(--text-faint);">
         <a href="./" style="color:var(--text-faint);text-decoration:none;">← BACK TO TRACKER</a>
       </div>`;
    document.getElementById('boot-signout').addEventListener('click', signOut);
    bootOverlay.classList.remove('hidden');
  }

  function hideBootOverlay() { bootOverlay.classList.add('hidden'); }

  function submitPicker() {
    const handle = (pickerInput.value || '').trim();
    if (!handle) return;
    const params = new URLSearchParams();
    params.set('member', handle.toLowerCase());
    window.location.search = params.toString();
  }
  bootGo.addEventListener('click', submitPicker);
  pickerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPicker(); });

  // ---------- auth + viewer resolution -----------------------------------

  async function fetchSession() {
    try {
      const res = await fetch(AUTH_ME_URL, { credentials: 'include' });
      if (res.status === 401) return null;
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return await res.json();
    } catch (err) {
      console.warn('[auth] /auth/me failed:', err);
      return null;
    }
  }

  async function signOut() {
    try {
      await fetch(AUTH_LOGOUT, { method: 'POST', credentials: 'include' });
    } catch (e) { /* best effort */ }
    window.location.href = window.location.pathname;
  }

  function resolveViewerFromMember(member) {
    viewer.member = member;
    viewer.handle = member.handle ?? '—';
    viewer.rankCode = (member.rank ?? 'CRM').toUpperCase();
    const tagInfo = (snapshot?.rankTags ?? []).find((r) => r.tag === viewer.rankCode);
    viewer.rank = tagInfo?.title ?? viewer.rankCode;
    viewer.isOfficer = isOfficerRank(viewer.rankCode);
  }

  function findMemberByDiscordId(discordId) {
    if (!discordId) return null;
    // Snapshot serializes the field as `discord_id` (snake_case to match
    // the underlying column name). Discord IDs are snowflake strings so
    // == is fine, but we compare as strings to be defensive against
    // any code path that might coerce one side to a number.
    return (snapshot?.roster ?? []).find(
      (m) => String(m.discord_id) === String(discordId),
    ) ?? null;
  }

  // Top-right HUD button: shows SIGN OUT when authed, hidden otherwise
  const hudSwitchBtn = document.getElementById('hud-switch');
  hudSwitchBtn.textContent = '⏻ SIGN OUT';
  hudSwitchBtn.addEventListener('click', signOut);

  async function init() {
    showBootLoading();

    // 1. Snapshot (public, no auth needed)
    try {
      const res = await fetch(SNAPSHOT_URL, { cache: 'no-cache' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      snapshot = await res.json();
    } catch (err) {
      console.error('snapshot fetch failed', err);
      showBootError(`Could not load org snapshot: ${err.message}. Check your connection or try again in a moment.`);
      return;
    }

    // EDIT MODE: bypass auth entirely. Use a placeholder viewer so the
    // HUD renders with neutral text, then render hotspots in draggable
    // mode. This is a layout-tuning tool — it shouldn't require a valid
    // session or roster membership to work.
    if (EDIT_MODE) {
      viewer.handle    = 'EDIT MODE';
      viewer.rank      = 'LAYOUT EDITOR';
      viewer.rankCode  = 'CRM';
      viewer.isOfficer = true; // unlock any officer-only hotspots so all are reachable
      viewer.member    = { handle: 'EDIT MODE', eventHistory: [], awards: [], hangars: [] };
      hudSwitchBtn.style.display = 'none';
      renderHUD();
      renderHotspots();
      hideBootOverlay();
      return;
    }

    // 2. Session
    session = await fetchSession();
    if (!session) {
      hudSwitchBtn.style.display = 'none';
      showBootSignIn();
      return;
    }

    // 3. Resolve member identity
    //    Priority:
    //      a) ?member=X URL override — only honored when the signed-in
    //         viewer is an officer (otherwise they could snoop on each
    //         other's stats). Non-officer override attempts silently
    //         fall through to their own quarters with a console hint.
    //      b) Roster lookup by signed-in Discord ID
    const params = new URLSearchParams(window.location.search);
    const handleOverride = params.get('member');

    // Determine if the viewer is an officer before processing override
    const viewerMember = findMemberByDiscordId(session.discordId);
    const viewerIsOfficer = viewerMember
      ? isOfficerRank((viewerMember.rank ?? 'CRM').toUpperCase())
      : false;

    let member;
    if (handleOverride && viewerIsOfficer) {
      member = findMember(handleOverride);
      if (!member) {
        showBootPicker('not_found');
        return;
      }
    } else {
      if (handleOverride && !viewerIsOfficer) {
        console.warn(
          `[quarters] ?member=${handleOverride} ignored — preview is officer-only`,
        );
      }
      if (!viewerMember) {
        showBootNotOnRoster();
        return;
      }
      member = viewerMember;
    }

    resolveViewerFromMember(member);
    renderHUD();
    renderHotspots();
    hideBootOverlay();
  }

  init();

  // ---------- ambient parallax ----------
  // Tiny mouse-driven tilt — subtle, doesn't disorient.
  const stage = document.getElementById('room-stage');
  let parallaxOn = window.matchMedia('(min-width: 801px) and (pointer: fine)').matches;
  if (parallaxOn) {
    stage.classList.add('parallax');
    stage.addEventListener('mousemove', (e) => {
      const rect = stage.getBoundingClientRect();
      const dx = (e.clientX - rect.width / 2) / rect.width;   // -0.5 to 0.5
      const dy = (e.clientY - rect.height / 2) / rect.height;
      stage.style.setProperty('--px', `${dx * -16}px`);
      stage.style.setProperty('--py', `${dy * -12}px`);
    });
  }
</script>

</body>
</html>
